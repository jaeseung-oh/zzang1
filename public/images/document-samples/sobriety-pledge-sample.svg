<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1273" viewBox="0 0 900 1273" role="img" aria-label="음주운전 재발방지 서약서 예시">
    <rect width="900" height="1273" fill="#f3f6fa"/>
    <rect x="62" y="42" width="776" height="1189" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <g opacity="0.052">
    <circle cx="450" cy="520" r="165" fill="none" stroke="#173968" stroke-width="22"/>
    <text x="450" y="505" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="42" font-weight="900" fill="#173968">RESET EDU</text>
    <text x="450" y="555" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="36" font-weight="900" fill="#173968">CENTER</text>
  </g><g transform="rotate(-24 450 520)"><text opacity="0.075" x="450" y="542" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="88" font-weight="900" fill="#0f172a">SAMPLE</text></g>
    <text x="450" y="136" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="46" font-weight="900" fill="#0f172a">음주운전 재발방지 서약서</text>
    <text x="450" y="188" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="21" font-weight="800" fill="#64748b">음주 후 운전 금지 및 주변인 확인 서약 예시</text>
    <rect x="112" y="232" width="676" height="2" fill="#cbd5e1"/>
    <text x="112" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">성명: ○○○</text>
    <text x="322" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">생년월일: ○○○○년 ○○월 ○○일</text>
    <g>
      <text x="112" y="300" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">1. 서약 내용</text>
      <text x="112" y="345" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">본인은 음주운전이 타인의 생명과 신체에 중대한 피해를 줄 수 있음을 인식하고</text>
<text x="112" y="381" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">앞으로 어떠한 경우에도 음주 후 운전하지 않을 것을 서약합니다.</text>
    </g>
<g>
      <text x="112" y="485" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">2. 구체적 서약사항</text>
      <text x="112" y="530" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">술을 마신 날에는 운전하지 않겠습니다.</text>
<text x="112" y="566" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">술을 마실 가능성이 있는 모임에는 차량을 가져가지 않겠습니다.</text>
    </g>
<g>
      <text x="112" y="670" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">3. 가족 및 사회에 대한 다짐</text>
      <text x="112" y="715" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">가족과 주변 사람에게 본 서약 내용을 알리고 생활 태도 변화로 신뢰를 회복하겠습니다.</text>
    </g>
<g>
      <text x="112" y="855" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">4. 최종 서약</text>
      <text x="112" y="900" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">위 내용을 충분히 이해하였으며, 다시는 음주운전을 하지 않을 것을 확인합니다.</text>
    </g>
    <text x="112" y="1068" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성일: ○○○○년 ○○월 ○○일</text>
    <text x="112" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성자: ○○○</text>
    <text x="360" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">서명: ○○○</text>
    <text x="450" y="1190" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="20" font-weight="800" fill="#64748b">리셋에듀센터 교육자료 · 예시 문서</text>
  </svg>