<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1273" viewBox="0 0 900 1273" role="img" aria-label="재발방지계획서 예시">
    <rect width="900" height="1273" fill="#f3f6fa"/>
    <rect x="62" y="42" width="776" height="1189" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <g opacity="0.052">
    <circle cx="450" cy="520" r="165" fill="none" stroke="#173968" stroke-width="22"/>
    <text x="450" y="505" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="42" font-weight="900" fill="#173968">RESET EDU</text>
    <text x="450" y="555" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="36" font-weight="900" fill="#173968">CENTER</text>
  </g><g transform="rotate(-24 450 520)"><text opacity="0.075" x="450" y="542" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="88" font-weight="900" fill="#0f172a">SAMPLE</text></g>
    <text x="450" y="136" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="46" font-weight="900" fill="#0f172a">재발방지계획서</text>
    <text x="450" y="188" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="21" font-weight="800" fill="#64748b">음주운전 재발 원인 점검 및 실천계획 작성 예시</text>
    <rect x="112" y="232" width="676" height="2" fill="#cbd5e1"/>
    <text x="112" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">성명: ○○○</text>
    <text x="322" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">생년월일: ○○○○년 ○○월 ○○일</text>
    <g>
      <text x="112" y="300" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">1. 작성 취지</text>
      <text x="112" y="345" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">본인은 음주 후 운전이 타인의 생명과 안전을 위협할 수 있는</text>
<text x="112" y="381" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">중대한 위법행위임을 인정하고 같은 잘못을 반복하지 않기 위해 작성합니다.</text>
    </g>
<g>
      <text x="112" y="485" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">2. 재발 원인 분석</text>
      <text x="112" y="530" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">음주 후 이동계획을 사전에 세우지 않았고 자신의 상태를 과신했습니다.</text>
<text x="112" y="566" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">대리운전이나 택시 이용을 비용 문제로 가볍게 생각한 점을 반성합니다.</text>
    </g>
<g>
      <text x="112" y="670" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">3. 구체적인 재발방지계획</text>
      <text x="112" y="715" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">술자리 전 귀가수단을 먼저 정하고 차량을 가져가지 않겠습니다.</text>
<text x="112" y="751" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">가족에게 일정과 귀가 방법을 공유하고 위험상황에서는 즉시 도움을 요청하겠습니다.</text>
    </g>
<g>
      <text x="112" y="855" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">4. 향후 다짐</text>
      <text x="112" y="900" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">말뿐인 반성이 아니라 생활 변화와 지속적인 자기점검으로 증명하겠습니다.</text>
    </g>
    <text x="112" y="1068" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성일: ○○○○년 ○○월 ○○일</text>
    <text x="112" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성자: ○○○</text>
    <text x="360" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">서명: ○○○</text>
    <text x="450" y="1190" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="20" font-weight="800" fill="#64748b">리셋에듀센터 교육자료 · 예시 문서</text>
  </svg>