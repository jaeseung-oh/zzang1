<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1273" viewBox="0 0 900 1273" role="img" aria-label="음주예방실천계획서 예시">
    <rect width="900" height="1273" fill="#f3f6fa"/>
    <rect x="62" y="42" width="776" height="1189" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <g opacity="0.052">
    <circle cx="450" cy="520" r="165" fill="none" stroke="#173968" stroke-width="22"/>
    <text x="450" y="505" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="42" font-weight="900" fill="#173968">RESET EDU</text>
    <text x="450" y="555" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="36" font-weight="900" fill="#173968">CENTER</text>
  </g><g transform="rotate(-24 450 520)"><text opacity="0.075" x="450" y="542" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="88" font-weight="900" fill="#0f172a">SAMPLE</text></g>
    <text x="450" y="136" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="46" font-weight="900" fill="#0f172a">음주예방실천계획서</text>
    <text x="450" y="188" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="21" font-weight="800" fill="#64748b">위험상황 대처계획 및 음주 후 이동수단 확보 기준</text>
    <rect x="112" y="232" width="676" height="2" fill="#cbd5e1"/>
    <text x="112" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">성명: ○○○</text>
    <text x="322" y="266" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">생년월일: ○○○○년 ○○월 ○○일</text>
    <g>
      <text x="112" y="300" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">1. 현재 음주습관 점검</text>
      <text x="112" y="345" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">주된 음주 상황: 회식, 지인 모임, 경조사 등</text>
<text x="112" y="381" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">음주 후 귀가 방법: 택시, 대리운전, 대중교통 이용 원칙</text>
    </g>
<g>
      <text x="112" y="485" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">2. 위험상황별 대처계획</text>
      <text x="112" y="530" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">회식이 예정된 날에는 차량을 가져가지 않습니다.</text>
<text x="112" y="566" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">숙취가 남아 있을 가능성이 있으면 다음 날 오전 운전도 자제합니다.</text>
    </g>
<g>
      <text x="112" y="670" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">3. 실천 점검표</text>
      <text x="112" y="715" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">술자리 전 귀가 방법 확인 / 차량 열쇠 관리 / 가족 연락</text>
<text x="112" y="751" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">대리운전 앱과 택시 앱 결제수단 사전 등록</text>
    </g>
<g>
      <text x="112" y="855" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="26" font-weight="900" fill="#111827">4. 생활 변화 계획</text>
      <text x="112" y="900" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="650" fill="#334155">음주 횟수와 음주량을 줄이고 스트레스 해소 방법을 운동과 휴식으로 바꿉니다.</text>
    </g>
    <text x="112" y="1068" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성일: ○○○○년 ○○월 ○○일</text>
    <text x="112" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">작성자: ○○○</text>
    <text x="360" y="1115" text-anchor="start" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="22" font-weight="800" fill="#111827">서명: ○○○</text>
    <text x="450" y="1190" text-anchor="middle" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="20" font-weight="800" fill="#64748b">리셋 재범방지교육센터 교육자료 · 예시 문서</text>
  </svg>